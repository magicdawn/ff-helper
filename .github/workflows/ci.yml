name: ci

on:
  - push
  - pull_request

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      # no cache
      # - name: apt install
      #   run: sudo apt install -y clang pkg-config libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev ffmpeg
      - name: apt install
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: clang libavcodec-dev libavformat-dev libavutil-dev pkg-config ffmpeg libavdevice-dev libblas-dev libavfilter-dev

      - uses: Swatinem/rust-cache@v2

      - run: ls *.node 2>/dev/null || echo "no .node files"
      - run: pnpm install
      - run: ls *.node 2>/dev/null || echo "no .node files"

      # cache samples
      - uses: actions/cache@v3
        with:
          path: 'test/sample-videos/*.mp4'
          key: ${{ runner.os }}-${{ hashFiles('./test/setup.ts') }}
      # test
      - run: pnpm test-cover

      # test:report
      - uses: codecov/codecov-action@v3

      # typedoc
      - if: github.ref_name == 'main'
        run: pnpm add typedoc -g

      - if: github.ref_name == 'main'
        run: typedoc ./ts-src/index.ts

      - if: github.ref_name == 'main'
        name: Deploy gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
